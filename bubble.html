<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    background: transparent;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
  }

  body {
    pointer-events: none;
    font-family: 'SF Pro Rounded', system-ui, -apple-system, sans-serif;
  }

  #stage {
    position: fixed;
    inset: 0;
    padding: 8px;
    pointer-events: none;
  }

  #bubble {
    position: absolute;
    left: 8px;
    top: 8px;
    max-width: 280px;
    min-width: 140px;
    padding: 10px 16px;
    background: linear-gradient(145deg, #fffaf3 0%, #fff2ec 50%, #ffe8ef 100%);
    border-radius: 16px;
    font: 14px/1.5 'SF Pro Rounded', system-ui, -apple-system, sans-serif;
    font-weight: 500;
    color: #3d2b22;
    box-shadow:
      0 4px 16px rgba(180, 100, 60, 0.15),
      0 0 0 1.5px rgba(220, 150, 110, 0.2),
      inset 0 1px 0 rgba(255,255,255,0.95);
    text-align: left;
    word-wrap: break-word;
    letter-spacing: 0.01em;
    opacity: 0;
    transform: scale(0.92);
    transform-origin: center center;
    transition: opacity 0.18s ease, transform 0.22s ease;
    pointer-events: auto;
  }

  #bubble.show {
    opacity: 1;
    transform: scale(1);
  }

  #bubble .arrow {
    position: absolute;
    width: 10px;
    height: 10px;
    background: #fff6f1;
    transform: rotate(45deg);
    box-shadow: 2px 2px 2px rgba(200, 130, 80, 0.06);
  }

  .bubble-quote {
    font-size: 11px;
    color: rgba(100, 75, 60, 0.4);
    margin-bottom: 4px;
    padding-bottom: 4px;
    border-bottom: 1px solid rgba(200, 160, 120, 0.12);
    line-height: 1.4;
  }

  #bubble-reactions {
    display: flex;
    gap: 6px;
    margin-top: 8px;
    justify-content: center;
    flex-wrap: wrap;
  }

  #bubble-reactions:empty {
    display: none;
    margin: 0;
  }

  #bubble-reactions button {
    padding: 4px 10px;
    border: 1px solid rgba(200, 140, 100, 0.25);
    border-radius: 10px;
    background: rgba(255, 255, 255, 0.7);
    color: #5a3d2e;
    font: 12px/1 'SF Pro Rounded', system-ui, sans-serif;
    cursor: pointer;
    transition: all 0.15s ease;
    pointer-events: auto;
  }

  #bubble-reactions button:hover {
    background: rgba(255, 200, 150, 0.4);
    border-color: rgba(200, 140, 100, 0.5);
  }
</style>
</head>
<body>
  <div id="stage">
    <div id="bubble">
      <span id="bubble-text"></span>
      <div id="bubble-reactions"></div>
      <div class="arrow" id="bubble-arrow"></div>
    </div>
  </div>
  <script type="module" src="/src/bubble.js"></script>
</body>
</html>
