<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: transparent;
    overflow: hidden;
    width: 100%;
    height: 100%;
    user-select: none;
    -webkit-user-select: none;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
  }

  #bubble {
    position: fixed;
    max-width: min(280px, calc(100vw - 24px));
    min-width: 140px;
    padding: 10px 16px;
    background: linear-gradient(145deg, #fffaf3 0%, #fff2ec 50%, #ffe8ef 100%);
    border-radius: 16px;
    font: 14px/1.5 'SF Pro Rounded', system-ui, -apple-system, sans-serif;
    font-weight: 500;
    color: #3d2b22;
    box-shadow:
      0 4px 16px rgba(180, 100, 60, 0.15),
      0 0 0 1.5px rgba(220, 150, 110, 0.2),
      inset 0 1px 0 rgba(255,255,255,0.95);
    opacity: 0;
    transition: opacity 0.3s ease, transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    pointer-events: none;
    z-index: 50;
    text-align: left;
    word-wrap: break-word;
    letter-spacing: 0.01em;
    transform: scale(0.85);
  }
  #bubble.show {
    opacity: 1;
    transform: scale(1);
  }
  .bubble-quote {
    font-size: 11px;
    color: rgba(100, 75, 60, 0.4);
    margin-bottom: 4px;
    padding-bottom: 4px;
    border-bottom: 1px solid rgba(200, 160, 120, 0.12);
    line-height: 1.4;
  }
  #bubble-reactions {
    display: flex;
    gap: 6px;
    margin-top: 8px;
    justify-content: center;
  }
  #bubble-reactions:empty { display: none; margin: 0; }
  #bubble-reactions button {
    padding: 4px 10px;
    border: 1px solid rgba(200, 140, 100, 0.25);
    border-radius: 10px;
    background: rgba(255, 255, 255, 0.7);
    color: #5a3d2e;
    font: 12px/1 'SF Pro Rounded', system-ui, sans-serif;
    cursor: pointer;
    transition: all 0.15s ease;
    pointer-events: auto;
  }
  #bubble-reactions button:hover {
    background: rgba(255, 200, 150, 0.4);
    border-color: rgba(200, 140, 100, 0.5);
  }

  #bubble .arrow {
    position: absolute;
    width: 10px; height: 10px;
    background: #fff6f1;
    transform: rotate(45deg);
    box-shadow: 2px 2px 2px rgba(200, 130, 80, 0.06);
  }

  #pet {
    display: block;
    cursor: url('/cursor-hand.svg') 28 28, pointer;
    margin-bottom: 10px;
  }

  #pet-hand {
    position: fixed;
    width: 64px; height: 64px;
    pointer-events: none;
    z-index: 200;
    opacity: 0;
    transition: opacity 0.15s ease;
    transform-origin: 50% 80%;
  }
  #pet-hand.active {
    opacity: 1;
    animation: pet-rock 0.3s ease-in-out infinite alternate;
  }
  @keyframes pet-rock {
    0% { transform: rotate(-8deg) scale(1); }
    100% { transform: rotate(8deg) scale(1.05); }
  }

  #pet-status {
    position: fixed;
    right: 15px;
    bottom: 170px;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 3px;
    z-index: 50;
  }

  #together {
    font: 11px/1 'SF Pro Rounded', system-ui, sans-serif;
    color: rgba(150, 110, 80, 0.6);
    letter-spacing: 0.02em;
    white-space: nowrap;
  }

  #hearts {
    display: flex;
    gap: 1px;
  }
  .heart-wrap {
    position: relative;
    width: 18px; height: 18px;
    font-size: 16px;
    line-height: 18px;
    display: inline-block;
  }
  .heart-bg {
    position: absolute;
    top: 0; left: 0;
    filter: grayscale(1);
    opacity: 0.25;
  }
  .heart-fill {
    position: absolute;
    top: 0; left: 0;
    overflow: hidden;
  }

  #chat-input {
    position: fixed;
    bottom: 10px; left: 50%;
    transform: translateX(-50%);
    width: 200px;
    padding: 8px 12px;
    border: 1.5px solid rgba(220, 150, 110, 0.3);
    border-radius: 14px;
    font: 13px 'SF Pro Rounded', system-ui, -apple-system, sans-serif;
    outline: none;
    background: rgba(255, 252, 248, 0.97);
    box-shadow: 0 3px 12px rgba(180, 100, 60, 0.12);
    z-index: 999;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease;
  }
  #chat-input.show {
    opacity: 1;
    pointer-events: auto;
  }
  #chat-input:focus { border-color: rgba(220, 140, 90, 0.5); }

  #context-menu {
    position: fixed;
    display: none;
    background: rgba(255, 252, 248, 0.97);
    border: 1px solid rgba(200, 160, 120, 0.2);
    border-radius: 12px;
    padding: 6px 0;
    box-shadow: 0 6px 24px rgba(0,0,0,0.12);
    z-index: 1000;
    min-width: 160px;
    backdrop-filter: blur(10px);
  }
  #context-menu.show { display: block; }
  #context-menu .menu-label {
    font: 10px/1 'SF Pro Rounded', system-ui, sans-serif;
    color: rgba(150, 110, 80, 0.5);
    padding: 6px 14px 4px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  #context-menu .menu-divider {
    height: 1px;
    background: rgba(200, 160, 120, 0.15);
    margin: 4px 0;
  }
  #context-menu button {
    display: block;
    width: 100%;
    padding: 7px 14px;
    border: none;
    background: none;
    font: 13px/1 'SF Pro Rounded', system-ui, sans-serif;
    color: #4a3830;
    text-align: left;
    cursor: pointer;
  }
  #context-menu button:hover {
    background: rgba(220, 170, 130, 0.15);
  }
  #context-menu button.menu-primary {
    font-weight: 600;
  }
  #context-menu button .menu-shortcut {
    float: right;
    color: rgba(150, 110, 80, 0.4);
    font-size: 11px;
    margin-left: 16px;
  }

  /* Settings Panel */
  #settings-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.3);
    z-index: 2000;
    display: none;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
  }
  #settings-overlay.show { display: flex; }
  #settings-panel {
    background: rgba(255, 252, 248, 0.98);
    border: 1px solid rgba(200, 160, 120, 0.2);
    border-radius: 16px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.15);
    width: min(560px, calc(100vw - 24px));
    max-height: 92vh;
    overflow-y: auto;
    padding: 0;
  }
  #settings-panel .settings-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px 12px;
    border-bottom: 1px solid rgba(200, 160, 120, 0.12);
  }
  #settings-panel .settings-header h2 {
    font: 600 15px/1 'SF Pro Rounded', system-ui, sans-serif;
    color: #3d2b22;
    margin: 0;
  }
  #settings-panel .settings-close {
    width: 24px; height: 24px;
    border: none; background: none;
    font-size: 16px; color: #9a7a6a;
    cursor: pointer;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #settings-panel .settings-close:hover {
    background: rgba(200, 160, 120, 0.15);
  }
  #settings-panel .settings-section {
    padding: 14px 20px;
    border-bottom: 1px solid rgba(200, 160, 120, 0.08);
  }
  #settings-panel .settings-section:last-child { border-bottom: none; }
  #settings-panel .settings-section label {
    display: block;
    font: 500 11px/1 'SF Pro Rounded', system-ui, sans-serif;
    color: rgba(150, 110, 80, 0.6);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 8px;
  }
  #settings-panel .settings-section input[type="text"] {
    width: 100%;
    padding: 8px 12px;
    border: 1.5px solid rgba(200, 160, 120, 0.25);
    border-radius: 10px;
    font: 13px 'SF Pro Rounded', system-ui, sans-serif;
    color: #3d2b22;
    background: rgba(255, 255, 255, 0.7);
    outline: none;
    transition: border-color 0.15s ease;
  }
  #settings-panel .settings-section input[type="text"]:focus {
    border-color: rgba(220, 140, 90, 0.5);
  }
  #settings-panel .settings-section input[type="text"]::placeholder {
    color: rgba(150, 110, 80, 0.35);
  }
  .sprite-options {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 12px;
  }
  .sprite-option {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    padding: 14px 12px;
    border: 2px solid transparent;
    border-radius: 14px;
    cursor: pointer;
    transition: all 0.15s ease;
    background: none;
    text-align: center;
    font: 13px/1 'SF Pro Rounded', system-ui, sans-serif;
    color: #4a3830;
    min-height: 156px;
  }
  .sprite-option:hover {
    background: rgba(220, 170, 130, 0.1);
  }
  .sprite-option.active {
    border-color: rgba(220, 150, 110, 0.4);
    background: rgba(255, 230, 200, 0.2);
    font-weight: 600;
  }
  .sprite-option canvas {
    width: 104px;
    height: 104px;
    image-rendering: auto;
  }
</style>
</head>
<body>
<div id="pet-status">
  <div id="together"></div>
  <div id="hearts"></div>
</div>
<div id="bubble">
  <span id="bubble-text"></span>
  <div id="bubble-reactions"></div>
  <div class="arrow" id="bubble-arrow"></div>
</div>
<canvas id="pet"></canvas>
<img id="pet-hand" src="/cursor-hand.svg" />
<input id="chat-input" type="text" placeholder="Say something to Mochi..." />
<div id="context-menu">
  <button id="menu-settings" class="menu-primary">🐾 Settings...</button>
  <div class="menu-divider"></div>
  <button id="menu-inspect">Inspect Element <span class="menu-shortcut">⌥⌘I</span></button>
  <div class="menu-divider"></div>
  <button id="menu-quit">Quit</button>
</div>
<div id="settings-overlay">
  <div id="settings-panel">
    <div class="settings-header">
      <h2>Settings</h2>
      <button class="settings-close" id="settings-close">&times;</button>
    </div>
    <div class="settings-section">
      <label>Pet Name</label>
      <input type="text" id="setting-pet-name" placeholder="Mochi" />
    </div>
    <div class="settings-section">
      <label>Call me</label>
      <input type="text" id="setting-owner-name" placeholder="How should your pet call you?" />
    </div>
    <div class="settings-section">
      <label>Character</label>
      <div class="sprite-options" id="sprite-options"></div>
    </div>
  </div>
</div>
<script type="module" src="/src/main.js"></script>
</body>
</html>
